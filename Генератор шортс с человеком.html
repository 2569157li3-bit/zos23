<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Шортсов: Парень с табличкой</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #222; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; flex-wrap: wrap; }
        .controls { flex: 1; background: #333; padding: 20px; border-radius: 10px; min-width: 300px; }
        .preview { flex: 1; text-align: center; }
        
        canvas { max-width: 100%; height: auto; border: 2px solid #555; border-radius: 5px; }
        
        h1 { text-align: center; color: #4CAF50; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input[type="text"], textarea, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border-radius: 4px; border: none; }
        input[type="color"] { width: 100%; height: 40px; cursor: pointer; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .btn { display: block; width: 100%; padding: 15px; margin-top: 20px; background: #4CAF50; color: white; border: none; font-size: 16px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #45a049; }
        .btn-video { background: #FF5722; }
        .btn-video:hover { background: #E64A19; }
        
        .file-upload { background: #444; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; border: 2px dashed #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Генератор Таблички</h1>

    <div class="container">
        <!-- Панель управления -->
        <div class="controls">
            <div class="file-upload">
                <label for="imgLoader" style="cursor: pointer;">📂 Нажми, чтобы загрузить фото парня</label>
                <input type="file" id="imgLoader" accept="image/*" style="display:none;">
            </div>

            <label>Текст на табличке:</label>
            <textarea id="textInput" rows="3">Продам гараж</textarea>

            <label>Шрифт:</label>
            <select id="fontFamily">
                <option value="Arial">Arial (Стандарт)</option>
                <option value="Impact">Impact (Мемный)</option>
                <option value="Comic Sans MS">Comic Sans</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier New</option>
            </select>

            <label>Цвет текста:</label>
            <input type="color" id="textColor" value="#000000">

            <label>Размер шрифта:</label>
            <input type="range" id="fontSize" min="10" max="150" value="40">

            <hr style="border-color: #555;">
            <h3>Настройки таблички</h3>
            
            <label>Положение (X / Y):</label>
            <input type="range" id="posX" min="0" max="100" value="25">
            <input type="range" id="posY" min="0" max="100" value="55">

            <label>Размеры (Ширина / Высота):</label>
            <input type="range" id="signW" min="10" max="100" value="50">
            <input type="range" id="signH" min="5" max="50" value="20">

            <label>
                <input type="checkbox" id="drawBackground" checked> Рисовать белую картонку
            </label>

            <button class="btn" onclick="downloadImage()">💾 Скачать Картинку</button>
            <button class="btn btn-video" id="videoBtn" onclick="recordVideo()">🎥 Скачать Видео (Shorts)</button>
            <p id="status" style="text-align: center; color: #aaa; margin-top: 10px;"></p>
        </div>

        <!-- Предпросмотр -->
        <div class="preview">
            <canvas id="memeCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        const imgLoader = document.getElementById('imgLoader');
        
        let uploadedImage = new Image();
        let isImageLoaded = false;

        // Элементы управления
        const textInput = document.getElementById('textInput');
        const textColor = document.getElementById('textColor');
        const fontFamily = document.getElementById('fontFamily');
        const fontSize = document.getElementById('fontSize');
        const posX = document.getElementById('posX');
        const posY = document.getElementById('posY');
        const signW = document.getElementById('signW');
        const signH = document.getElementById('signH');
        const drawBackground = document.getElementById('drawBackground');

        // Обработчик загрузки фото
        imgLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedImage.onload = function() {
                    canvas.width = uploadedImage.width;
                    canvas.height = uploadedImage.height;
                    isImageLoaded = true;
                    draw();
                }
                uploadedImage.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // Функция отрисовки
        function draw() {
            if (!isImageLoaded) {
                // Заглушка, если фото нет
                canvas.width = 400;
                canvas.height = 600;
                ctx.fillStyle = "#333";
                ctx.fillRect(0,0, 400, 600);
                ctx.fillStyle = "#fff";
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Загрузи фото парня!", 200, 300);
                return;
            }

            // 1. Рисуем фото
            ctx.drawImage(uploadedImage, 0, 0);

            const W = canvas.width;
            const H = canvas.height;

            // Вычисляем координаты таблички из ползунков (в процентах)
            const sx = (posX.value / 100) * W;
            const sy = (posY.value / 100) * H;
            const sw = (signW.value / 100) * W;
            const sh = (signH.value / 100) * H;

            // 2. Рисуем "картонку" (если галочка стоит)
            if (drawBackground.checked) {
                ctx.fillStyle = "#F2F2F2"; // Цвет бумаги
                ctx.fillRect(sx, sy, sw, sh);
                
                // Рамка
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 3;
                ctx.strokeRect(sx, sy, sw, sh);
            }

            // 3. Рисуем текст
            ctx.fillStyle = textColor.value;
            ctx.font = `${fontSize.value}px ${fontFamily.value}`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Центр таблички
            const centerX = sx + sw / 2;
            const centerY = sy + sh / 2;

            // Разбиваем текст на строки (если нажали Enter)
            const lines = textInput.value.split('\n');
            const lineHeight = parseInt(fontSize.value) * 1.2;
            const totalTextHeight = lines.length * lineHeight;
            
            // Смещаем начало рисования вверх, чтобы блок текста был по центру
            let startY = centerY - (totalTextHeight / 2) + (lineHeight / 2);

            lines.forEach((line, index) => {
                ctx.fillText(line, centerX, startY + (index * lineHeight));
            });
        }

        // Обновляем при любом изменении
        const inputs = [textInput, textColor, fontFamily, fontSize, posX, posY, signW, signH, drawBackground];
        inputs.forEach(input => input.addEventListener('input', draw));

        // Инициализация (пустой экран)
        draw();

        // --- Скачивание Картинки ---
        function downloadImage() {
            if (!isImageLoaded) return alert("Сначала загрузи фото!");
            const link = document.createElement('a');
            link.download = 'guy_with_sign.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // --- Создание Видео (Shorts) ---
        function recordVideo() {
            if (!isImageLoaded) return alert("Сначала загрузи фото!");
            
            const btn = document.getElementById('videoBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerText = "Создаем видео...";
            status.innerText = "Запись идет (5 секунд)...";

            // Захват потока с канваса
            const stream = canvas.captureStream(30); // 30 FPS
            const recorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9' 
                // Примечание: .webm поддерживается Chrome/Firefox. 
                // Для чистого MP4 в браузере нужны тяжелые библиотеки (ffmpeg.wasm), 
                // но YouTube Shorts прекрасно принимает .webm
            });

            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'shorts_video.webm';
                a.click();
                
                btn.disabled = false;
                btn.innerText = "🎥 Скачать Видео (Shorts)";
                status.innerText = "Готово! Файл скачан.";
            };

            recorder.start();

            // Останавливаем через 5 секунд
            setTimeout(() => {
                recorder.stop();
            }, 5000);
        }
    </script>
</body>
</html>
